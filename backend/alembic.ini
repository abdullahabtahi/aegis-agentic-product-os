[alembic]
# Path to migration scripts (relative to this file)
script_location = migrations

# Prepend sys.path with this path before importing env.py
prepend_sys_path = .

# Template used to generate migration filenames; default is %(rev)s_%(slug)s
file_template = %%(rev)s_%%(slug)s

# Timezone for the revision timestamp
timezone = UTC

# Max length of characters to apply to the "slug" field
truncate_slug_length = 40

# Set to "true" to run the environment during the 'revision' command, regardless of autogenerate
revision_environment = false

# Set to "true" to allow .pyc and .pyo files without a source .py file to be detected as revisions
sourceless = false

# Version path separator; defaults to os.pathsep
version_path_separator = os

# The output encoding used when revision files are written from script.py.mako; defaults to utf-8
output_encoding = utf-8

# Database URL — loaded from environment in env.py (not stored here)
# Override with ALLOYDB_URL or DATABASE_URL environment variables.
sqlalchemy.url = postgresql+asyncpg://aegis:aegis@localhost:5432/aegis_dev


[post_write_hooks]
# Post-write hooks; format is hooks = <hook1>, <hook2>
# hooks = ruff
# ruff.type = exec
# ruff.entrypoint = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
