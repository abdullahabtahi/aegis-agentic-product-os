version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 16
  - React 19
  - Tailwind CSS
  - CopilotKit
features:
  - name: Directions Dashboard
    description: View and manage all strategic bets and their progress
    files:
      - app/workspace/directions/page.tsx
      - app/workspace/directions/[id]/page.tsx
  - name: Mission Control
    description: Live pipeline state visualization
    files:
      - app/workspace/mission-control/page.tsx
  - name: Intervention Inbox
    description: View and approve AI generated interventions
    files:
      - app/workspace/inbox/page.tsx
      - components/interventions/InterventionInbox.tsx
known_limitations: []
