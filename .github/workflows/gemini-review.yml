name: Gemini CLI Security Review
on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  review:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@gemini-cli /review'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gemini CLI Review & Security Analysis
        uses: google-gemini/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # This installs the security extension and runs the analysis
          setup_commands: |
            gemini extensions install https://github.com/gemini-cli-extensions/security
          review_instructions: |
            Run /security:analyze to identify potential vulnerabilities in the code changes.
            Also run /security:scan-deps to check for vulnerable dependencies.
