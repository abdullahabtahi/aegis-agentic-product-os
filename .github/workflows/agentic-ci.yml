name: Agentic CI/CD (legacy — superseded)

# ⚠️  This workflow is kept for reference only.
# It has been replaced by a two-tier pipeline:
#
#   tier-1-ci.yml  — fast checks on every push/PR (lint, type check, unit tests)
#                    no GCP dependency; completes in ~2 min
#
#   tier-2-eval.yml — eval + integration on main / release / manual dispatch
#                     requires GCP credentials (WIF or SA key)
#
# This file is intentionally disabled (no trigger) to avoid duplicate runs.
# Delete it once you've confirmed the two-tier setup works end-to-end.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you triggering the legacy workflow?"
        required: false

jobs:
  notice:
    runs-on: ubuntu-latest
    steps:
      - name: Legacy workflow notice
        run: |
          echo "This workflow is superseded by tier-1-ci.yml and tier-2-eval.yml."
          echo "Please use those instead."
