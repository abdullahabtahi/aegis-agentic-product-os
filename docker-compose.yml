# docker-compose.yml
services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: aegis-backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      - AEGIS_LOCAL_DEV=true
    networks:
      - aegis-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the client bundle at build time — browser reaches backend via host port
        - NEXT_PUBLIC_BACKEND_URL=http://localhost:8080
    container_name: aegis-frontend
    ports:
      - "3000:3000"
    environment:
      # Server-side (Next.js API route → ag_ui_adk SSE endpoint)
      - BACKEND_URL=http://backend:8080/adk/v1/app
      # Passed to browser as runtime fallback for workspace
      - NEXT_PUBLIC_DEFAULT_WORKSPACE_ID=ws-demo
    depends_on:
      - backend
    networks:
      - aegis-network

networks:
  aegis-network:
    driver: bridge
